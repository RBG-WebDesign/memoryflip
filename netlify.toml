[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# API routes are handled by Netlify Functions (netlify/functions/*.js)
# SPA fallback must come AFTER the /api/* paths
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
