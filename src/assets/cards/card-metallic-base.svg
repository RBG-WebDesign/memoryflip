<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 448" role="img" aria-labelledby="title desc">
  <title id="title">Card Base</title>
  <desc id="desc">Playing card base with a black surface and subtle dark border.</desc>
  <defs>
    <linearGradient id="borderMetal" x1="0" y1="24" x2="320" y2="424" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="0.5" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="innerShade" x1="46" y1="64" x2="274" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="topSheen" x1="28" y1="28" x2="28" y2="148" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g transform="translate(-96,-32)">
    <rect x="96" y="32" width="320" height="448" fill="url(#borderMetal)"/>
    <rect x="108" y="44" width="296" height="424" fill="#050505"/>
    <rect x="124" y="60" width="264" height="392" fill="#0a0a0a"/>
    <rect x="124" y="60" width="264" height="120" fill="url(#topSheen)"/>
    <rect x="124" y="60" width="264" height="392" fill="url(#innerShade)"/>
    <rect x="137" y="74" width="238" height="364" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
    <rect x="96.5" y="32.5" width="319" height="447" fill="none" stroke="#333333" stroke-opacity="0.25"/>
  </g>
</svg>
